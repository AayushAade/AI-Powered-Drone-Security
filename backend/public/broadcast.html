<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Drone Broadcaster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #localVideo {
      width: 100%;
      flex: 1;
      object-fit: cover;
      background: #111;
    }
    .hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      padding-top: max(env(safe-area-inset-top), 16px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 10;
    }
    .hud h1 { font-size: 14px; color: #0f0; letter-spacing: 2px; }
    .hud .status { font-size: 11px; margin-top: 4px; }
    .hud .status.connected { color: #0f0; }
    .hud .status.disconnected { color: #f55; }
    .hud .status.streaming { color: #0ff; }
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      padding-bottom: max(env(safe-area-inset-bottom), 20px);
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      text-align: center;
      z-index: 10;
    }
    #startBtn {
      background: #34C759;
      color: #fff;
      border: none;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      width: 90%;
    }
    #startBtn.active {
      background: #FF3B30;
    }
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f00;
      animation: pulse 1s infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <video id="localVideo" autoplay playsinline muted></video>

  <div class="hud">
    <h1>🛩️ DRONE CAM — BROADCASTER</h1>
    <div id="socketStatus" class="status disconnected">⚫ Not connected</div>
    <div id="rtcStatus" class="status">WebRTC: Idle</div>
  </div>

  <div class="controls">
    <button id="startBtn" onclick="toggleBroadcast()">▶ START BROADCAST</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const ICE_SERVERS = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };

    let socket = null;
    let pc = null;
    let localStream = null;
    let broadcasting = false;

    const video = document.getElementById('localVideo');
    const startBtn = document.getElementById('startBtn');
    const socketStatusEl = document.getElementById('socketStatus');
    const rtcStatusEl = document.getElementById('rtcStatus');

    function setSocketStatus(text, cls) {
      socketStatusEl.textContent = text;
      socketStatusEl.className = 'status ' + cls;
    }
    function setRtcStatus(text) {
      rtcStatusEl.textContent = 'WebRTC: ' + text;
    }

    async function toggleBroadcast() {
      if (broadcasting) {
        stopBroadcast();
      } else {
        await startBroadcast();
      }
    }

    async function startBroadcast() {
      startBtn.disabled = true;
      startBtn.textContent = '⏳ STARTING...';

      // 1. Get camera stream — this is SILENT, no shutter sound, no flash
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 60 },
          },
          audio: false,
        });
        video.srcObject = localStream;
        console.log('[Camera] ✅ Stream acquired:', localStream.getTracks().length, 'tracks');
      } catch (e) {
        console.error('[Camera] ❌ Failed:', e);
        alert('Could not access camera. Please allow camera permission and try again.');
        startBtn.disabled = false;
        startBtn.textContent = '▶ START BROADCAST';
        return;
      }

      // 2. Connect to backend
      socket = io(window.location.origin, { transports: ['websocket'] });

      socket.on('connect', () => {
        console.log('[Socket] ✅ Connected:', socket.id);
        setSocketStatus('🟢 Connected to Command Center', 'connected');
        // 3. Immediately create offer and broadcast
        createOffer();
      });

      socket.on('disconnect', () => {
        console.log('[Socket] ❌ Disconnected');
        setSocketStatus('🔴 Disconnected', 'disconnected');
      });

      socket.on('webrtc_answer', async (data) => {
        console.log('[WebRTC] Answer received');
        try {
          if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            console.log('[WebRTC] ✅ Remote description set');
          }
        } catch (e) {
          console.error('[WebRTC] ❌ Error setting answer:', e);
        }
      });

      socket.on('webrtc_ice_candidate', async (data) => {
        try {
          if (pc && data.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
          }
        } catch (e) {
          console.error('[WebRTC] ❌ Error adding ICE:', e);
        }
      });

      socket.on('viewer_joined', () => {
        console.log('[WebRTC] 👁️ New viewer joined, re-sending offer');
        createOffer();
      });

      broadcasting = true;
      startBtn.classList.add('active');
      startBtn.disabled = false;
      startBtn.innerHTML = '<span class="live-dot"></span> STOP BROADCAST';
    }

    async function createOffer() {
      if (pc) { pc.close(); pc = null; }

      pc = new RTCPeerConnection(ICE_SERVERS);

      // Add camera tracks
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });
      console.log('[WebRTC] Added', localStream.getTracks().length, 'tracks');

      pc.onicecandidate = (event) => {
        if (event.candidate && socket && socket.connected) {
          socket.emit('webrtc_ice_candidate', {
            candidate: event.candidate,
            target: 'viewer',
          });
        }
      };

      pc.oniceconnectionstatechange = () => {
        console.log('[WebRTC] ICE state:', pc.iceConnectionState);
        setRtcStatus(pc.iceConnectionState);
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setRtcStatus('🎥 LIVE — Streaming to Dashboard');
          setSocketStatus('🟢 Broadcasting Live Video', 'streaming');
        }
      };

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('webrtc_offer', { senderId: 'broadcaster', offer });
        console.log('[WebRTC] ✅ Offer sent');
        setRtcStatus('Offer sent, waiting for dashboard...');
      } catch (e) {
        console.error('[WebRTC] ❌ Error creating offer:', e);
        setRtcStatus('Error: ' + e.message);
      }
    }

    function stopBroadcast() {
      if (pc) { pc.close(); pc = null; }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
        video.srcObject = null;
      }
      if (socket) { socket.disconnect(); socket = null; }

      broadcasting = false;
      startBtn.classList.remove('active');
      startBtn.textContent = '▶ START BROADCAST';
      setSocketStatus('⚫ Not connected', 'disconnected');
      setRtcStatus('Idle');
    }
  </script>
</body>
</html>
